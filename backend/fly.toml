# fly.toml app configuration file generated for portfolio-backend on 2026-04-28
# See https://fly.io/docs/reference/configuration/ for information

app = "debrup-portfolio-backend"
primary_region = "ams"

[build]
  [build.args]
    NODE_VERSION = "20"
    PYTHON_VERSION = "3.12"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[env]
  PORT = "8000"

[[statics]]
  guest_path = "/app/static"
  url_prefix = "/static"

[deploy]
  release_command = "python manage.py migrate --noinput"
